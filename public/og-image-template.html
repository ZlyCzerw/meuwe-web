<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; }

  .root {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #FFF6EC 0%, #FFE8DC 60%, #FFDDD0 100%);
    position: relative; overflow: hidden;
    display: flex; align-items: center;
    font-family: "Nunito", system-ui, sans-serif;
  }

  /* map grid */
  .map-grid {
    position: absolute; inset: 0;
    background:
      linear-gradient(rgba(45,43,42,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(45,43,42,0.05) 1px, transparent 1px);
    background-size: 56px 56px;
  }

  /* warm left fade over grid */
  .left-fade {
    position: absolute; inset: 0;
    background: linear-gradient(to right, #FFF6EC 28%, transparent 65%);
    z-index: 1;
  }

  /* roads */
  .road {
    position: absolute;
    background: rgba(255,255,255,0.75);
    border-radius: 6px;
  }

  /* branding */
  .brand {
    position: relative; z-index: 10;
    padding-left: 90px;
    display: flex; flex-direction: column; gap: 18px;
  }

  .logo {
    font-family: "Hanken Grotesk", system-ui, sans-serif;
    font-weight: 900;
    font-size: 168px;
    line-height: 0.9;
    letter-spacing: -8px;
    display: flex; align-items: baseline;
  }
  .me { color: #FF7A45; }
  .u  { color: #4FC3F7; }
  .we { color: #7DD87A; }

  .tagline {
    font-size: 26px;
    font-weight: 700;
    color: #2D2B2A;
    opacity: 0.65;
    letter-spacing: -0.2px;
    padding-left: 4px;
  }


  /* pin */
  .pin {
    position: absolute;
    z-index: 5;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@900&family=Nunito:wght@700;800&display=swap">
</head>

<div class="root">

  <!-- roads -->
  <div class="road" style="left:460px;top:155px;width:700px;height:18px;transform:rotate(-6deg);"></div>
