name: Event Sync

on:
  schedule:
    # Every 3 days at 06:00 UTC (07:00 Canary Islands time)
    - cron: '0 6 */3 * *'
  workflow_dispatch:
    # Runnable manually: GitHub → Actions → Event Sync → Run workflow

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit generated SQL back to repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Type-check scraper
        run: npm run typecheck:scraper

      - name: Run event-sync scraper
        run: npx tsx scripts/event-sync/index.ts
        env:
          MEUWE_TEAM_UUID: ${{ secrets.MEUWE_TEAM_UUID }}

      - name: Commit generated SQL to repo
        run: |
          git config user.name "event-sync[bot]"
          git config user.email "bot@meuwe.app"
          git add supabase/seeds/lagenda_*.sql
          if git diff --staged --quiet; then
            echo "No new events — nothing to commit."
          else
            git commit -m "sync: events from lagenda.org $(date +%Y-%m-%d)"
            git push
          fi
